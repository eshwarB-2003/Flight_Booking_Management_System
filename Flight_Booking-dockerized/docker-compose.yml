version: "3.9"
 
#  Flight Booking Management System — Docker Compose
 
services:
 
  # ── PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: flight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flight_booking_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flight_booking_system"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ── Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: flight-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
 
  # ── Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: flight-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
 
  # ── Eureka
  eureka:
    build:
      context: ./EurekaService
      dockerfile: Dockerfile
    container_name: flight-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      - SERVER_PORT=8761
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
 
  # ── User Service (:8086)
  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: flight-user-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - SERVER_PORT=8086
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flight_booking_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_started
 
  # ── Admin Service (:8081)
  admin-service:
    build:
      context: ./AdminService
      dockerfile: Dockerfile
    container_name: flight-admin-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flight_booking_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_started
 
  # ── Flight Inventory Service (:8084)
  flight-inventory-service:
    build:
      context: ./FlightInventoryService
      dockerfile: Dockerfile
    container_name: flight-inventory-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flight_booking_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_started
 
  # ── Payment Service (:8083)
  payment-service:
    build:
      context: ./PaymentService
      dockerfile: Dockerfile
    container_name: flight-payment-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flight_booking_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_started
 
  # ── Booking Service (:8082)
  booking-service:
    build:
      context: ./BookingService
      dockerfile: Dockerfile
    container_name: flight-booking-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flight_booking_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_started
      kafka:
        condition: service_started
 
  # ── Notification Service (:8085)
  notification-service:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: flight-notification-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - SERVER_PORT=8085
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flight_booking_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_MAIL_HOST=sandbox.smtp.mailtrap.io
      - SPRING_MAIL_PORT=2525
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_started
      kafka:
        condition: service_started
 
  # ── API Gateway (:8080)
  # No healthcheck — Spring Security blocks all HTTP checks.
  # Frontend uses service_started instead of service_healthy.
  api-gateway:
    build:
      context: ./APIGatewayService
      dockerfile: Dockerfile
    container_name: flight-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_ID=user-service
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_URI=lb://USER-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_PREDICATES[0]=Path=/api/users/**
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_ID=booking-service
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_URI=lb://BOOKING-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_PREDICATES[0]=Path=/api/bookings/**
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_ID=flight-service
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_URI=lb://FLIGHT-INVENTORY-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_PREDICATES[0]=Path=/api/flights/**
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_ID=payment-service
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_URI=lb://PAYMENT-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_PREDICATES[0]=Path=/api/payments/**
      - SPRING_CLOUD_GATEWAY_ROUTES[4]_ID=notification-service
      - SPRING_CLOUD_GATEWAY_ROUTES[4]_URI=lb://NOTIFICATION-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[4]_PREDICATES[0]=Path=/api/notifications/**
      - SPRING_CLOUD_GATEWAY_ROUTES[5]_ID=admin-service
      - SPRING_CLOUD_GATEWAY_ROUTES[5]_URI=lb://ADMIN-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[5]_PREDICATES[0]=Path=/api/admin/**
    depends_on:
      eureka:
        condition: service_healthy
      user-service:
        condition: service_started
      admin-service:
        condition: service_started
      flight-inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
      booking-service:
        condition: service_started
      notification-service:
        condition: service_started
 
  # ── React Frontend (Nginx :3000)
  frontend:
    build:
      context: ./flight-frontend
      dockerfile: Dockerfile
    container_name: flight-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
 
  # ── Kafka UI (:9090)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: flight-kafka-ui
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
 
volumes:
  postgres_data:
    driver: local