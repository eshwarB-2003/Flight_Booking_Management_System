# Server
# ---------------------------------------------------------------
server.port=8084
spring.application.name=NotificationService

# ---------------------------------------------------------------
# PostgreSQL Database (matching your existing config)
# ---------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/flight_booking_system
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.write-dates-as-timestamps=false

# ---------------------------------------------------------------
# Kafka
# ---------------------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.flightbooking.NotificationService.dto.BookingEventDTO
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Topic Names
kafka.topics.booking-confirmed=booking-confirmed
kafka.topics.booking-cancelled=booking-cancelled
kafka.topics.notification-retry=notification-retry

# ---------------------------------------------------------------
# Email (Gmail)
# ---------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# ---------------------------------------------------------------
# Notification Settings
# ---------------------------------------------------------------
notification.email.from=noreply@flightbooking.com
notification.email.from-name=Flight Booking System
notification.sms.enabled=false
notification.sms.account-sid=your-twilio-account-sid
notification.sms.auth-token=your-twilio-auth-token
notification.sms.from-number=+1234567890
notification.checkin.reminder-hours-before=24

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging.level.com.flightbooking=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG